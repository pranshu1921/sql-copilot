<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 680 660" role="img">
  <title>Agentic SQL co-pilot system architecture</title>
  <desc>End-to-end flow from user question through Streamlit UI, SQL agent with self-correction loop, DuckDB execution, to results display on Hugging Face Spaces</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="660" fill="white"/>
  <rect x="145" y="174" width="305" height="228" rx="10" fill="#F8F7FF" stroke="#534AB7" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="160" y="167" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#534AB7">SQL Agent  ·  agent.py</text>
  <rect x="170" y="20" width="240" height="48" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="290" y="40" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#444441">User natural language question</text>
  <text x="290" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Type any business question in plain English</text>
  <line x1="290" y1="68" x2="290" y2="99" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="170" y="100" width="240" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="290" y="120" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0C447C">Streamlit chat UI  ·  app.py</text>
  <text x="290" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#185FA5">Chat input  ·  query history  ·  SQL viewer</text>
  <line x1="290" y1="148" x2="290" y2="189" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="170" y="190" width="240" height="48" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="290" y="210" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3C3489">Schema context builder</text>
  <text x="290" y="228" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#534AB7">Tables  ·  columns  ·  data types from DuckDB</text>
  <line x1="290" y1="238" x2="290" y2="259" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="170" y="260" width="240" height="48" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="290" y="280" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3C3489">Prompt assembler</text>
  <text x="290" y="298" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#534AB7">Question + schema context for SQLCoder</text>
  <line x1="410" y1="284" x2="468" y2="284" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="438" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854F0B">inference call</text>
  <rect x="469" y="248" width="185" height="84" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="562" y="268" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#633806">defog/sqlcoder-7b-2</text>
  <text x="562" y="285" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#854F0B">HF Inference API</text>
  <text x="562" y="301" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#854F0B">Same HF account  ·  same token</text>
  <text x="562" y="317" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#854F0B">Returns raw SQL string</text>
  <path d="M562 332 L562 374 L411 374" fill="none" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="530" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854F0B">SQL response</text>
  <rect x="170" y="350" width="240" height="48" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="290" y="370" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3C3489">SQLGlot syntax validator</text>
  <text x="290" y="388" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#534AB7">Parse and validate SQL before execution</text>
  <line x1="290" y1="398" x2="290" y2="419" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M170 444 L118 444 L118 284 L169 284" fill="none" stroke="#E24B4A" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="88" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E24B4A">retry</text>
  <text x="88" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E24B4A">max 3x</text>
  <rect x="170" y="420" width="240" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="290" y="440" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#085041">DuckDB query executor  ·  db.py</text>
  <text x="290" y="458" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">Execute SQL against Olist tables</text>
  <line x1="469" y1="444" x2="411" y2="444" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="469" y="408" width="185" height="80" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="562" y="428" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#085041">9 Olist tables (DuckDB)</text>
  <text x="562" y="445" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">orders · customers · products</text>
  <text x="562" y="461" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">sellers · reviews · payments</text>
  <text x="562" y="477" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="10" fill="#0F6E56">Loaded via HF Datasets Hub at startup</text>
  <line x1="290" y1="468" x2="290" y2="499" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="170" y="500" width="240" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="290" y="520" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0C447C">Results formatter</text>
  <text x="290" y="538" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#185FA5">Table  ·  SQL display  ·  plain English explanation</text>
  <path d="M170 524 L100 524 L100 124 L169 124" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="74" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#378ADD">back</text>
  <text x="74" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#378ADD">to UI</text>
  <rect x="20" y="584" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="36" y="593" font-family="Arial, sans-serif" font-size="11" fill="#444441">User input</text>
  <rect x="104" y="584" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="120" y="593" font-family="Arial, sans-serif" font-size="11" fill="#444441">UI layer</text>
  <rect x="178" y="584" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="194" y="593" font-family="Arial, sans-serif" font-size="11" fill="#444441">Agent layer</text>
  <rect x="268" y="584" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="284" y="593" font-family="Arial, sans-serif" font-size="11" fill="#444441">Data layer</text>
  <rect x="350" y="584" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="366" y="593" font-family="Arial, sans-serif" font-size="11" fill="#444441">HF Inference</text>
  <line x1="448" y1="589" x2="464" y2="589" stroke="#E24B4A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="470" y="593" font-family="Arial, sans-serif" font-size="11" fill="#444441">Retry path (max 3x)</text>
  <text x="340" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#B4B2A9">Agentic SQL Co-pilot  ·  HF Spaces  ·  DuckDB  ·  defog/sqlcoder-7b-2  ·  Olist E-commerce</text>
</svg>
